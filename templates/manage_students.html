<!DOCTYPE html>
<html>
<head>
    <title>Manage Students</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Student Management</span>
        <a href="/admin_dashboard" class="btn btn-outline-light btn-sm">Back</a>
    </div>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between mb-3">
        <h3>All Students</h3>
        <a href="/add_student" class="btn btn-success">+ Add Student</a>
    </div>

    <table class="table table-striped table-bordered shadow">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Department</th>
                <th>Year</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>
        {% for s in students %}
            <tr>
                <td>{{ s[0] }}</td>
                <td>{{ s[1] }}</td>
                <td>{{ s[2] }}</td>
                <td>{{ s[3] }}</td>
                <td>{{ s[4] }}</td>
                <td>
                    <a href="/edit_student/{{ s[0] }}" class="btn btn-sm btn-primary">Edit</a>
                    <a href="/delete_student/{{ s[0] }}" 
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Are you sure you want to delete this student?')">
                       Delete
                    </a>
                </td>
            </tr>
        {% endfor %}
        </tbody>

    </table>

</div>

</body>
</html>
