<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Internship Management System</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1 ">Internship Management System</span>
    </div>
</nav>

<!-- Main Section -->
<div class="container d-flex align-items-center justify-content-center" style="min-height: 90vh;">
    <div class="row w-100 justify-content-center">

        <!-- User Card -->
        <div class="col-md-4 mb-4">
            <div class="card shadow-lg text-center p-4 h-100 border-0">
                <div class="card-body">
                    <h3 class="card-title mb-3">👨‍🎓 Student</h3>
                    <p class="card-text text-muted">
                        View ongoing and completed internships.
                    </p>
                        <a href="/login" class="btn btn-primary w-100"></a>
                        Enter as User
                    </a>
                </div>
            </div>
        </div>

        <!-- Admin Card -->
        <div class="col-md-4 mb-4">
            <div class="card shadow-lg text-center p-4 h-100 border-0">
                <div class="card-body">
                    <h3 class="card-title mb-3">👨‍💼 Admin</h3>
                    <p class="card-text text-muted">
                        Manage students and internship records.
                    </p>
                    <a href="/login" class="btn btn-dark w-100">
                        Enter as Admin
                    </a>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Optional JS -->
<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
