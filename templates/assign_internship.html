<!DOCTYPE html>
<html>
<head>
    <title>Assign Internship</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>Assign Internship</h2>

    <form method="POST" action="/assign_internship">

        <h3>Student Details</h3>
        <input type="text" name="name" placeholder="Student Name" required>
        <input type="email" name="email" placeholder="Student Email" required>
        <input type="text" name="phone" placeholder="Phone Number" required>
        <input type="number" name="dept_id" placeholder="Department ID" required>

        <h3>Internship Details</h3>
        <input type="text" name="title" placeholder="Internship Title" required>
        <input type="text" name="company" placeholder="Company Name" required>
        <input type="text" name="duration" placeholder="Duration (e.g., 3 Months)" required>
        <input type="number" name="stipend" placeholder="Stipend" required>

        <h3>Application Details</h3>
        <select name="status">
            <option value="Pending">Pending</option>
            <option value="Approved">Approved</option>
            <option value="Rejected">Rejected</option>
        </select>

        <input type="date" name="apply_date" required>

        <button type="submit">Assign Internship</button>

    </form>
</div>

</body>
</html>
