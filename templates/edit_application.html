<!DOCTYPE html>
<html>
<head>
<title>Edit Application</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-warning">
<h4><i class="bi bi-pencil-square"></i> Edit Application</h4>
</div>

<div class="card-body">

<form method="POST" action="{{ url_for('update_application', id=application.application_id) }}">

<div class="mb-3">
<label>Status</label>

<select name="status" class="form-control">

<option value="Applied"
{% if application.status=='Applied' %}selected{% endif %}>
Applied
</option>

<option value="Selected"
{% if application.status=='Selected' %}selected{% endif %}>
Selected
</option>

<option value="Rejected"
{% if application.status=='Rejected' %}selected{% endif %}>
Rejected
</option>

</select>

</div>

<div class="mb-3">
<label>Apply Date</label>

<input type="date"
name="apply_date"
value="{{ application.apply_date }}"
class="form-control">
</div>

<button type="submit" class="btn btn-success">
<i class="bi bi-check"></i> Update
</button>

<a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">
Cancel
</a>

</form>

</div>
</div>

</div>

</body>
</html>
