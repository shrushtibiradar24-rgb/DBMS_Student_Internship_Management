<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | Internship Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
    body {
        margin: 0;
        height: 100vh;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Segoe UI', sans-serif;
    }

    .glass-card {
        width: 100%;
        max-width: 480px;
        padding: 40px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        color: white;
        animation: slideUp 0.8s ease;
    }

    .glass-card h2 {
        font-weight: 600;
    }

    .form-floating > label {
        color: #ddd;
    }

    .form-control {
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: white;
    }

    .form-control:focus {
        background: rgba(255, 255, 255, 0.3);
        box-shadow: none;
        color: white;
    }

    .btn-custom {
        background: linear-gradient(45deg, #00c6ff, #0072ff);
        border: none;
        border-radius: 30px;
        transition: 0.3s;
        font-weight: 500;
    }

    .btn-custom:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(0, 114, 255, 0.6);
    }

    .strength-bar {
        height: 5px;
        border-radius: 5px;
        margin-top: 5px;
        transition: 0.3s;
    }

    .login-link {
        color: #00c6ff;
        text-decoration: none;
    }

    .login-link:hover {
        text-decoration: underline;
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(40px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>

<body>

<div class="glass-card">

    <div class="text-center mb-4">
        <i class="bi bi-mortarboard-fill fs-1"></i>
        <h2>Create Account</h2>
        <p class="text-light">Internship Management Portal</p>
    </div>

    <form method="POST" onsubmit="return validatePassword()">

        <!-- Name -->
        <div class="form-floating mb-3">
            <input type="text" class="form-control" name="name" placeholder="Full Name" required>
            <label><i class="bi bi-person"></i> Full Name</label>
        </div>

        <!-- Email -->
        <div class="form-floating mb-3">
            <input type="email" class="form-control" name="email" id="email" placeholder="Email" required>
            <label><i class="bi bi-envelope"></i> Email Address</label>
            <small id="emailFeedback" class="text-warning"></small>
        </div>

        <!-- Password -->
        <div class="form-floating mb-1">
            <input type="password" class="form-control" name="password" id="password" placeholder="Password" onkeyup="checkStrength()" required>
            <label><i class="bi bi-lock"></i> Password</label>
        </div>

        <div class="strength-bar" id="strengthBar"></div>

        <!-- Confirm Password -->
        <div class="form-floating mt-3 mb-3">
            <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password" required>
            <label><i class="bi bi-lock-fill"></i> Confirm Password</label>
        </div>

        <!-- Role -->
        <div class="mb-4">
            <div class="mb-4 text-center">
    <small class="text-light">
        Accounts are created as <strong>Student Users</strong> by default.
    </small>
</div>
        </div>

        <div class="d-grid">
            <button type="submit" class="btn btn-custom text-white py-2">
                <i class="bi bi-person-plus"></i> Register
            </button>
        </div>

    </form>

    <div class="text-center mt-4">
        <small>Already registered? 
            <a href="{{ url_for('login') }}" class="login-link">Login here</a>
        </small>
    </div>

</div>

<script>
    function checkStrength() {
        let password = document.getElementById("password").value;
        let strengthBar = document.getElementById("strengthBar");

        if (password.length < 6) {
            strengthBar.style.width = "30%";
            strengthBar.style.background = "red";
        } else if (password.match(/[A-Z]/) && password.match(/[0-9]/)) {
            strengthBar.style.width = "100%";
            strengthBar.style.background = "lime";
        } else {
            strengthBar.style.width = "60%";
            strengthBar.style.background = "orange";
        }
    }

    function validatePassword() {
        let pass = document.getElementById("password").value;
        let confirm = document.getElementById("confirmPassword").value;

        if (pass !== confirm) {
            alert("Passwords do not match!");
            return false;
        }
        return true;
    }

    document.getElementById("email").addEventListener("input", function() {
        let email = this.value;
        let feedback = document.getElementById("emailFeedback");

        if (!email.includes("@")) {
            feedback.innerText = "Invalid email format";
        } else {
            feedback.innerText = "";
        }
    });
</script>

</body>
</html>
